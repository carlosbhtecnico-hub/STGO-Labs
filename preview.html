<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agencia Digital</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
  <h1>Agencia Digital</h1>
  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#servicios">Servicios</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<main>

<section id="inicio">
  <h2>Impulsamos tu negocio</h2>
  <p>Diseño web, marketing y desarrollo</p>
</section>

<section id="servicios">
  <h2>Servicios</h2>
  <ul>
    <li>Diseño Web</li>
    <li>SEO</li>
    <li>Marketing Digital</li>
  </ul>
</section>

<section id="contacto">
  <h2>Contáctanos</h2>

  <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="correo" placeholder="Correo">
    <textarea id="mensaje" placeholder="Mensaje"></textarea>
    <button type="submit">Enviar</button>
  </form>

  <p id="respuesta"></p>
</section>

</main>

<footer>
  <p>© 2026 Agencia Digital</p>
</footer>

<script src="script.js"></script>
</body>
</html>
